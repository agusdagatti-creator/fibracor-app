<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FIBRACOR">
<title>FIBRACOR — Sistema de gestión</title>
<style>
/* ── Reset y base ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --navy:#1B3D6E; --navy-dark:#0C2850; --navy-light:#E6EFF8;
  --green:#2E7D32; --green-light:#E8F5E9;
  --amber:#F57F17; --amber-light:#FFF8E1;
  --red:#C62828;   --red-light:#FFEBEE;
  --purple:#4527A0;--purple-light:#EDE7F6;
  --teal:#00695C;  --teal-light:#E0F2F1;
  --gray:#455A64;  --gray-light:#ECEFF1;
  --bg:#F5F7FA; --card:#FFFFFF;
  --text:#1A1A2E; --text2:#546E7A; --text3:#90A4AE;
  --border:#E0E7EF; --shadow:0 2px 8px rgba(0,0,0,.08);
  --radius:12px; --radius-sm:8px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── Utilidades ──────────────────────────────────────── */
.hidden{display:none!important;}
.flex{display:flex;} .col{flex-direction:column;} .gap4{gap:4px;} .gap8{gap:8px;} .gap12{gap:12px;} .gap16{gap:16px;}
.items-center{align-items:center;} .justify-between{justify-content:space-between;} .justify-center{justify-content:center;}
.flex1{flex:1;} .w100{width:100%;} .text-center{text-align:center;}
.bold{font-weight:600;} .semi{font-weight:500;}
.small{font-size:12px;} .xsmall{font-size:11px;} .large{font-size:18px;}
.text2{color:var(--text2);} .text3{color:var(--text3);}
.mt4{margin-top:4px;} .mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16{margin-top:16px;}
.mb8{margin-bottom:8px;} .mb12{margin-bottom:12px;} .mb16{margin-bottom:16px;}
.p12{padding:12px;} .p16{padding:16px;}
.radius{border-radius:var(--radius);} .radius-sm{border-radius:var(--radius-sm);}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
.divider{height:1px;background:var(--border);margin:12px 0;}

/* ── Badges ──────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge-blue{background:var(--navy-light);color:var(--navy);}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-amber{background:var(--amber-light);color:var(--amber);}
.badge-red{background:var(--red-light);color:var(--red);}
.badge-purple{background:var(--purple-light);color:var(--purple);}
.badge-teal{background:var(--teal-light);color:var(--teal);}
.badge-gray{background:var(--gray-light);color:var(--gray);}

/* ── Botones ─────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--font);}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-dark);}
.btn-success{background:var(--green);color:#fff;}
.btn-success:hover{background:#1B5E20;}
.btn-danger{background:var(--red);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-outline:hover{background:var(--gray-light);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-block{width:100%;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;}

/* ── Inputs ──────────────────────────────────────────── */
.input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);color:var(--text);background:#fff;transition:border .15s;outline:none;}
.input:focus{border-color:var(--navy);}
.select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font);color:var(--text);background:#fff;outline:none;cursor:pointer;}
.label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;display:block;}
.form-group{margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── Login screen ────────────────────────────────────── */
#screen-login{min-height:100vh;background:linear-gradient(135deg,var(--navy) 0%,#2D5A9E 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:#fff;border-radius:20px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .logo-icon{width:64px;height:64px;background:var(--navy);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;}
.login-logo h1{font-size:22px;font-weight:700;color:var(--navy);}
.login-logo p{font-size:13px;color:var(--text2);margin-top:2px;}
.login-error{background:var(--red-light);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;}

/* ── App shell ───────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar ─────────────────────────────────────────── */
#sidebar{width:240px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.sidebar-logo .app-name{font-size:18px;font-weight:700;color:#fff;}
.sidebar-logo .app-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
.user-info{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.user-avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff;flex-shrink:0;}
.user-name{font-size:13px;font-weight:500;color:#fff;}
.user-area{font-size:11px;color:rgba(255,255,255,.5);}
.nav-section{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);padding:16px 16px 6px;letter-spacing:.8px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:rgba(255,255,255,.7);cursor:pointer;border-left:3px solid transparent;transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#fff;}
.nav-item .nav-icon{font-size:16px;width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid rgba(255,255,255,.1);}
.btn-logout{background:rgba(255,255,255,.1);color:#fff;border:none;width:100%;padding:9px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-family:var(--font);}
.btn-logout:hover{background:rgba(255,255,255,.18);}

/* ── Main content ────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);flex:1;}
.content{flex:1;overflow-y:auto;padding:20px;}

/* ── Hamburger (mobile) ──────────────────────────────── */
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:8px;}
.hamburger span{width:20px;height:2px;background:var(--text);border-radius:2px;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;}

/* ── Métricas dashboard ──────────────────────────────── */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
.metric-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.metric-val{font-size:28px;font-weight:700;margin:4px 0;}
.metric-label{font-size:12px;color:var(--text2);}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── Tabla ───────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;background:#fff;font-size:13px;}
th{text-align:left;padding:10px 14px;color:var(--text2);font-weight:500;border-bottom:2px solid var(--border);font-size:12px;white-space:nowrap;background:#FAFBFC;}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#F8FAFD;}

/* ── Progress bar ────────────────────────────────────── */
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .4s;}

/* ── Alerta ──────────────────────────────────────────── */
.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:10px;border-left:4px solid;}
.alert-red{background:var(--red-light);border-color:var(--red);color:var(--red);}
.alert-amber{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}
.alert-green{background:var(--green-light);border-color:var(--green);color:var(--green);}
.alert-blue{background:var(--navy-light);border-color:var(--navy);color:var(--navy);}

/* ── Modal ───────────────────────────────────────────── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}

/* ── Toast ───────────────────────────────────────────── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:12px 20px;border-radius:20px;font-size:13px;z-index:999;transition:opacity .3s;pointer-events:none;white-space:nowrap;}

/* ── Loading ─────────────────────────────────────────── */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Inventario cards (mobile friendly) ──────────────── */
.inv-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;}
.inv-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.inv-item-name{font-size:14px;font-weight:600;}
.inv-item-code{font-size:11px;color:var(--text3);}
.stock-bars{display:flex;gap:3px;height:8px;border-radius:4px;overflow:hidden;margin:6px 0;}
.stock-seg{height:100%;border-radius:2px;}
.stock-legend{display:flex;gap:12px;font-size:11px;color:var(--text2);}
.stock-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;}

/* ── Obras ───────────────────────────────────────────── */
.obra-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;transition:box-shadow .15s;}
.obra-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);}
.obra-etapa{display:flex;align-items:center;gap:6px;margin-top:8px;}
.etapa-dot{width:8px;height:8px;border-radius:50%;}

/* ── Mobile responsive ───────────────────────────────── */
@media(max-width:768px){
  #sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  .sidebar-overlay.open{display:block;}
  .hamburger{display:flex;}
  #main{width:100%;}
  .content{padding:14px;}
  .form-row{grid-template-columns:1fr;}
  .metrics-grid{grid-template-columns:1fr 1fr;}
  .topbar{padding:0 14px;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     LOGIN
══════════════════════════════════════════════════════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🔌</div>
      <h1>FIBRACOR</h1>
      <p>Sistema de gestión operativa</p>
    </div>
    <div id="login-error" class="login-error hidden"></div>
    <div class="form-group">
      <label class="label">Email</label>
      <input class="input" type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="label">Contraseña</label>
      <input class="input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-block mt8" onclick="doLogin()" id="btn-login">
      Ingresar
    </button>
    <p class="text-center small text2 mt12">FIBRACOR · Procedimiento Operativo v2.0</p>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     APP
══════════════════════════════════════════════════════ -->
<div id="app" class="hidden">

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="app-name">🔌 FIBRACOR</div>
      <div class="app-sub">Gestión operativa</div>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">?</div>
      <div>
        <div class="user-name" id="user-name">—</div>
        <div class="user-area" id="user-area">—</div>
      </div>
    </div>
    <nav id="nav-menu"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div class="topbar">
      <div class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </div>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <button class="btn btn-outline btn-sm" onclick="refreshView()">↻ Actualizar</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     MODALES
══════════════════════════════════════════════════════ -->
<div class="modal-backdrop hidden" id="modal-backdrop">
  <div class="modal" id="modal-body"></div>
</div>

<!-- Toast -->
<div id="toast" style="opacity:0"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURACIÓN — Pegá acá tu URL de Apps Script
// ═══════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbysdLOdxeufCTCSzHotogb0lI5ooud8MvtbTiYxovpgq2l99HtJCi4lff5yHftyGbES/exec";

// ═══════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════════
let USER   = null;
let TOKEN  = null;
let VISTA  = null;

// Menú por módulo
const MENU_CONFIG = [
  { mod:"dashboard",    icon:"📊", label:"Dashboard",          section:"Principal" },
  { mod:"mis_tareas",   icon:"✅", label:"Mis tareas",          section:"Principal" },
  { mod:"obras",        icon:"🏗️", label:"Obras / Proyectos",   section:"Operaciones" },
  { mod:"inventario",   icon:"📦", label:"Inventario / Pañol",  section:"Operaciones" },
  { mod:"movimientos",  icon:"🔄", label:"Retiros y devoluc.",  section:"Operaciones" },
  { mod:"tecnicos",     icon:"👷", label:"Técnicos",            section:"Operaciones" },
  { mod:"compras",      icon:"🛒", label:"Compras",             section:"Administración" },
  { mod:"costos",       icon:"💰", label:"Centro de costos",    section:"Administración" },
  { mod:"comercial",    icon:"📈", label:"Comercial",           section:"Administración" },
  { mod:"contabilidad", icon:"🧾", label:"Contabilidad",        section:"Administración" },
  { mod:"trazabilidad", icon:"📜", label:"Trazabilidad",        section:"Control" },
  { mod:"reportes",     icon:"📄", label:"Reportes PDF",        section:"Control" },
  { mod:"usuarios",     icon:"👤", label:"Usuarios",            section:"Control" },
];

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════

async function api(action, params = {}, body = null) {
  const url = new URL(API_URL);
  url.searchParams.set("action", action);
  if (TOKEN) url.searchParams.set("token", TOKEN);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));

  const opts = body
    ? { method:"POST", body: JSON.stringify({ ...body, token: TOKEN }) }
    : { method:"GET" };

  const res  = await fetch(url.toString(), opts);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "Error desconocido");
  return data.data;
}

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════

async function doLogin() {
  const email = document.getElementById("login-email").value.trim();
  const pass  = document.getElementById("login-pass").value;
  const btn   = document.getElementById("btn-login");
  const err   = document.getElementById("login-error");

  if (!email || !pass) { showError(err, "Completá email y contraseña"); return; }
  err.classList.add("hidden");
  btn.textContent = "Ingresando...";
  btn.disabled = true;

  try {
    // Login va por POST con body
    const url = new URL(API_URL);
    url.searchParams.set("action", "login");
    const res  = await fetch(url.toString(), {
      method: "POST",
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    TOKEN = data.data.token;
    USER  = data.data.user;
    localStorage.setItem("fibracor_token", TOKEN);
    localStorage.setItem("fibracor_user",  JSON.stringify(USER));
    initApp();
  } catch(e) {
    showError(err, e.message);
    btn.textContent = "Ingresar";
    btn.disabled = false;
  }
}

function logout() {
  localStorage.removeItem("fibracor_token");
  localStorage.removeItem("fibracor_user");
  USER = TOKEN = null;
  document.getElementById("app").classList.add("hidden");
  document.getElementById("screen-login").style.display = "flex";
}

function showError(el, msg) {
  el.textContent = msg;
  el.classList.remove("hidden");
}

// ═══════════════════════════════════════════════════════════
// INIT APP
// ═══════════════════════════════════════════════════════════

function initApp() {
  document.getElementById("screen-login").style.display = "none";
  document.getElementById("app").classList.remove("hidden");

  // Avatar y nombre
  const initials = (USER.nombre||"?").split(/[\s,]+/).map(p=>p[0]).join("").slice(0,2).toUpperCase();
  document.getElementById("user-avatar").textContent = initials;
  document.getElementById("user-name").textContent   = USER.nombre;
  document.getElementById("user-area").textContent   = USER.area + " · " + USER.rol;

  // Construir nav según módulos habilitados
  buildNav();

  // Ir al primer módulo disponible
  const first = USER.modulos?.[0] || "dashboard";
  goTo(first);
}

function buildNav() {
  const nav     = document.getElementById("nav-menu");
  nav.innerHTML = "";
  let lastSection = "";

  MENU_CONFIG.forEach(item => {
    if (!USER.modulos?.includes(item.mod)) return;
    if (item.section !== lastSection) {
      const sec = document.createElement("div");
      sec.className = "nav-section";
      sec.textContent = item.section;
      nav.appendChild(sec);
      lastSection = item.section;
    }
    const el = document.createElement("div");
    el.className = "nav-item";
    el.id = "nav-" + item.mod;
    el.innerHTML = `<span class="nav-icon">${item.icon}</span>${item.label}`;
    el.onclick = () => { goTo(item.mod); closeSidebar(); };
    nav.appendChild(el);
  });
}

function goTo(mod) {
  VISTA = mod;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const navEl = document.getElementById("nav-" + mod);
  if (navEl) navEl.classList.add("active");
  const cfg = MENU_CONFIG.find(m => m.mod === mod);
  document.getElementById("topbar-title").textContent = cfg ? cfg.label : mod;
  renderView(mod);
}

function refreshView() { if (VISTA) renderView(VISTA); }

async function renderView(mod) {
  const content = document.getElementById("content");
  content.innerHTML = `<div class="spinner"></div>`;
  try {
    switch(mod) {
      case "dashboard":   await renderDashboard(content);   break;
      case "obras":       await renderObras(content);       break;
      case "inventario":  await renderInventario(content);  break;
      case "movimientos": await renderMovimientos(content); break;
      case "compras":     await renderCompras(content);     break;
      case "costos":      await renderCostos(content);      break;
      case "tecnicos":    await renderTecnicos(content);    break;
      case "trazabilidad":await renderTrazabilidad(content);break;
      case "usuarios":    await renderUsuarios(content);    break;
      case "mis_tareas":  await renderMisTareas(content);   break;
      default: content.innerHTML = `<div class="card"><p class="text2">Módulo en construcción: ${mod}</p></div>`;
    }
  } catch(e) {
    content.innerHTML = `<div class="alert alert-red">Error cargando ${mod}: ${e.message}</div>`;
  }
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD

      </div>
      <div class="metric-card">
        <div class="metric-label">Stock crítico</div>
        <div class="metric-val" style="color:${d.inventario.criticos>0?'var(--red)':'var(--green)'}">${d.inventario.criticos}</div>
        <div class="metric-sub">ítems bajo mínimo</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Compras pendientes</div>
        <div class="metric-val" style="color:var(--amber)">${d.compras.pendientes_aprobacion}</div>
        <div class="metric-sub">esperando aprobación</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Técnicos disponibles</div>
        <div class="metric-val" style="color:var(--green)">${d.tecnicos.disponibles}</div>
        <div class="metric-sub">${d.tecnicos.en_obra} en obra · ${d.tecnicos.de_viaje} de viaje</div>
      </div>
    </div>
    ${d.inventario.criticos>0 ? `
    <div class="alert alert-red mb12">
      ⚠ Stock crítico en ${d.inventario.criticos} ítem(s):
      ${d.inventario.criticos_lista.map(i=>`<br>• ${i.descripcion} — disponible: ${i.disponible} (mín: ${i.minimo})`).join("")}
    </div>` : ""}
    <div class="card mb12">
      <div class="bold mb8">Actividad reciente</div>
      ${(d.ultimos_eventos||[]).length === 0
        ? '<p class="text2 small">Sin eventos recientes</p>'

        <div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;">

}

async function renderInventario(el) {
  const d = await api("getInventario");
  const puedeIngresar = d.puede_ingresar;
  const puedeEgresar  = d.puede_egresar;

  el.innerHTML = `
    <div class="flex justify-between items-center mb12">
      <div>
        <span class="bold">${d.total} ítems</span>
        ${d.criticos>0 ? `<span class="badge badge-red ml8">⚠ ${d.criticos} críticos</span>`:""}
      </div>
      <div class="flex gap8">
        ${puedeIngresar ? `<button class="btn btn-success btn-sm" onclick="modalIngreso()">+ Ingresar</button>`:""}
        ${puedeEgresar  ? `<button class="btn btn-primary btn-sm" onclick="modalEgreso()">− Retirar</button>`:""}
      </div>
    </div>
    ${d.items.map(item => `
    <div class="inv-card">
      <div class="inv-card-header">
        <div>
          <div class="inv-item-name">${item.descripcion}</div>
          <div class="inv-item-code">${item.item_id} · ${item.categoria}</div>
        </div>
        <span class="badge ${item.alerta_critica?'badge-red':'badge-green'}">${item.alerta_critica?'⚠ Bajo stock':'✓ OK'}</span>
      </div>
      <div class="stock-bars">
        ${item.stock_disponible>0 ? `<div class="stock-seg flex1" style="background:#2E7D32;max-width:${pct(item.stock_disponible,item.stock_disponible+item.stock_en_obra+item.stock_fuera_servicio)}%"></div>`:""}
        ${item.stock_en_obra>0 ? `<div class="stock-seg flex1" style="background:#1B3D6E;max-width:${pct(item.stock_en_obra,item.stock_disponible+item.stock_en_obra+item.stock_fuera_servicio)}%"></div>`:""}
        ${item.stock_fuera_servicio>0 ? `<div class="stock-seg flex1" style="background:#C62828;max-width:${pct(item.stock_fuera_servicio,item.stock_disponible+item.stock_en_obra+item.stock_fuera_servicio)}%"></div>`:""}
      </div>
      <div class="stock-legend">
        <span><span class="stock-dot" style="background:#2E7D32"></span>Disponible: <b>${item.stock_disponible}</b> ${item.unidad}</span>
        <span><span class="stock-dot" style="background:#1B3D6E"></span>En obra: <b>${item.stock_en_obra}</b></span>
        ${item.stock_fuera_servicio>0?`<span><span class="stock-dot" style="background:#C62828"></span>F. servicio: <b>${item.stock_fuera_servicio}</b></span>`:""}
      </div>
      ${item.stock_minimo>0?`<div class="small text2 mt4">Mínimo requerido: ${item.stock_minimo} ${item.unidad}</div>`:""}
      <div class="flex gap8 mt8">
        ${puedeIngresar?`<button class="btn btn-success btn-sm" onclick='modalIngreso("${item.item_id}","${item.descripcion}")'>+ Ingresar</button>`:""}
        ${puedeEgresar?`<button class="btn btn-outline btn-sm" onclick='modalEgreso("${item.item_id}","${item.descripcion}")'>− Retirar</button>`:""}
        <button class="btn btn-outline btn-sm" onclick='verHistorialItem("${item.item_id}","${item.descripcion}")'>Historial</button>
      </div>
    </div>`).join("")}`;
}

function pct(val, total) {
  if (!total) return 0;
  return Math.round((val/total)*100);
}

// Modal ingreso de mercadería
async function modalIngreso(itemId="", desc="") {
  const obras = await api("getObras");
  openModal(`

    <div class="form-group">
      <label class="label">Código de ítem</label>
      <input class="input" id="m-item-id" value="${itemId}" placeholder="ej: MAT-001">
    </div>
    <div class="form-group">
      <label class="label">Descripción</label>
      <input class="input" id="m-desc" value="${desc}" placeholder="Nombre del ítem">
    </div>
    <div class="form-group">
      <label class="label">Cantidad a ingresar</label>
      <input class="input" id="m-cant" type="number" min="1" placeholder="0">
    </div>
    <div class="form-group">
      <label class="label">Concepto / motivo</label>
      <input class="input" id="m-concepto" placeholder="ej: Compra COM-001, Devolución de obra">
    </div>
    <div class="form-group">
      <label class="label">N° remito / factura (opcional)</label>
      <input class="input" id="m-ref" placeholder="ej: FAC-2024-0089">
    </div>
    <button class="btn btn-success btn-block mt8" onclick="confirmarIngreso()">✓ Confirmar ingreso</button>
    <button class="btn btn-outline btn-block mt8" onclick="closeModal()">Cancelar</button>
  `);
}

async function confirmarIngreso() {
  const itemId   = document.getElementById("m-item-id").value.trim();
  const cantidad = parseFloat(document.getElementById("m-cant").value);
  const concepto = document.getElementById("m-concepto").value.trim();
  const ref      = document.getElementById("m-ref").value.trim();
  if (!itemId || !cantidad || cantidad<=0) { toast("Completá ítem y cantidad"); return; }
  try {
    await api("ingresarMercaderia", {}, { item_id:itemId, cantidad, concepto, referencia:ref });
    closeModal();
    toast("✓ Ingreso registrado correctamente");
    renderView("inventario");
  } catch(e) { toast("Error: "+e.message); }
}

async function confirmarEgreso() {
  const itemId   = document.getElementById("m-item-id").value.trim();
  const cantidad = parseFloat(document.getElementById("m-cant").value);
  const tipo     = document.getElementById("m-tipo").value;
  const obraId   = document.getElementById("m-obra").value;
  const estHerr  = document.getElementById("m-estado-herr").value;
  const formRef  = document.getElementById("m-form-ref").value;
  const obs      = document.getElementById("m-obs").value;
  if (!itemId || !cantidad || cantidad<=0) { toast("Completá ítem y cantidad"); return; }
  try {
    await api("egresarMercaderia", {}, { item_id:itemId, cantidad, tipo_mov:tipo, obra_id:obraId,
      estado_herramienta:estHerr, formulario_ref:formRef, observaciones:obs });
    closeModal();
    toast("✓ " + tipo + " registrado correctamente");
    renderView("inventario");
  } catch(e) { toast("Error: "+e.message); }

async function verHistorialItem(itemId, desc) {
  const d = await api("getHistorialItem", { item_id: itemId });
  openModal(`
    <div class="modal-title">📋 Historial — ${desc}</div>
    ${d.movimientos.length===0 ? '<p class="text2">Sin movimientos registrados</p>' :
    `<div style="overflow-x:auto"><table>
      <tr><th>Fecha</th><th>Tipo</th><th>Cant.</th><th>Obra</th><th>Responsable</th></tr>
      ${d.movimientos.map(m=>`<tr>
        <td>${m.fecha}</td>
        <td><span class="badge ${m.tipo_mov==='Retiro'?'badge-blue':m.tipo_mov==='Devolucion'?'badge-green':'badge-amber'}">${m.tipo_mov}</span></td>
        <td>${m.cantidad}</td><td>${m.obra_id||'—'}</td><td>${m.responsable}</td>

async function renderObras(el) {
  const d = await api("getObras");
  const puedeCrear = ["Dirección","Comercial"].includes(USER.area);

  el.innerHTML = `
    <div class="flex justify-between items-center mb12">
      <div class="bold">${d.total} obras</div>
      ${puedeCrear ? `<button class="btn btn-primary btn-sm" onclick="modalNuevaObra()">+ Nueva OIO</button>`:""}
    </div>
    ${d.obras.map(o => {
      const etapaColor = o.etapa_actual>=7?"#2E7D32":o.etapa_actual>=4?"#1B3D6E":"#F57F17";
      return `
      <div class="obra-card" onclick="verObraDetalle('${o.obra_id}')">
        <div class="flex justify-between items-center">
          <div>
            <div class="bold">${o.obra_id} — ${o.cliente}</div>
            <div class="small text2">${o.nombre_obra}</div>
          </div>
          <span class="badge ${estadoBadge(o.estado)}">${o.estado}</span>
        </div>
        <div class="obra-etapa">
          <div class="etapa-dot" style="background:${etapaColor}"></div>
          <span class="small text2">Etapa ${o.etapa_actual}/8 · Jefe: ${o.jefe_obra||'—'}</span>
          ${o.presupuesto ? `<span class="small text3 ml8">$${parseFloat(o.presupuesto).toLocaleString('es-AR')}</span>`:""}
        </div>
      </div>`}).join("")}`;
}

function estadoBadge(estado) {
  const m = { "En ejecución":"badge-green","Cerrada":"badge-gray","Para cierre":"badge-teal","Pendiente OIO":"badge-amber","Planificación":"badge-blue" };
  return m[estado] || "badge-gray";
}

async function confirmarNuevaObra() {
  const data = {
    obra_id: document.getElementById("o-id").value.trim(),
    cliente: document.getElementById("o-cliente").value.trim(),
    nombre_obra: document.getElementById("o-nombre").value.trim(),
    sitio: document.getElementById("o-sitio").value.trim(),
    alcance_tecnico: document.getElementById("o-alcance").value.trim(),
    fecha_inicio_est: document.getElementById("o-inicio").value,
    fecha_fin_est: document.getElementById("o-fin").value,
    jefe_obra: document.getElementById("o-jefe").value,
    presupuesto: document.getElementById("o-presupuesto").value,
    observaciones: document.getElementById("o-obs").value.trim(),
    emitida_por: USER.nombre,
  };
  if (!data.cliente || !data.nombre_obra) { toast("Cliente y nombre son obligatorios"); return; }

    const r = await api("createObra", {}, data);
    closeModal();

}

async function confirmarCompra() {
  const data = {
    obra_id: document.getElementById("c-obra").value,
    item_id: document.getElementById("c-item").value,
    descripcion: document.getElementById("c-desc").value.trim(),
    cantidad_faltante: document.getElementById("c-cant").value,
    unidad: document.getElementById("c-unidad").value.trim(),
    prioridad: document.getElementById("c-prior").value,
    fecha_limite: document.getElementById("c-fecha").value,
    proveedor: document.getElementById("c-prov").value.trim(),
  };
  if (!data.cantidad_faltante) { toast("Cantidad requerida"); return; }
  try {
    const r = await api("createCompra", {}, data);
    closeModal();
    toast("✓ Solicitud " + r.compraId + " enviada");

async function cargarCostosObra(obraId) {

      <div class="metric-card"><div class="metric-label">Disponible</div><div class="metric-val" style="color:${d.disponible<0?'var(--red)':'var(--green)'}">$${d.disponible.toLocaleString('es-AR')}</div></div>
    </div>
    <div class="card mb12">
      <div class="bold small mb8">Progreso del presupuesto</div>
      <div class="progress"><div class="progress-fill" style="width:${Math.min(d.pct_ejecutado,100)}%;background:${d.pct_ejecutado>90?'var(--red)':d.pct_ejecutado>70?'var(--amber)':'var(--navy)'}"></div></div>
      <div class="flex justify-between xsmall text2 mt4"><span>${d.pct_ejecutado}% ejecutado</span><span>${100-d.pct_ejecutado}% disponible</span></div>
      <div class="divider"></div>
      ${Object.entries(d.por_categoria).map(([cat,monto])=>`
      <div class="flex justify-between small" style="padding:4px 0">
        <span>${cat}</span><span class="semi">$${monto.toLocaleString('es-AR')}</span>
      </div>`).join("")}
    </div>
    <div class="flex justify-between items-center mb8">
      <div class="bold small">Movimientos (${d.costos.length})</div>

    </div>
    <div class="table-wrap"><table>
      <tr><th>Fecha</th><th>Categoría</th><th>Concepto</th><th>Monto</th><th>Estado</th></tr>
      ${d.costos.map(c=>`<tr>
        <td class="xsmall">${c.fecha}</td>
        <td><span class="badge badge-gray">${c.categoria}</span></td>
        <td>${c.concepto}</td>
        <td class="semi">$${parseFloat(c.monto||0).toLocaleString('es-AR')}</td>
        <td><span class="badge ${c.estado==='Aprobado'||c.estado==='Pagado'?'badge-green':c.estado==='Pendiente'?'badge-amber':'badge-gray'}">${c.estado}</span></td>
      </tr>`).join("")}

async function modalNuevoCosto(obraId) {
  openModal(`
    <div class="modal-title">💰 Registrar costo — ${obraId}</div>
    <div class="form-group"><label class="label">Categoría</label>
      <select class="select" id="ct-cat"><option>Materiales</option><option>Mano de obra</option><option>Viáticos</option><option>Equipos</option><option>Logística</option><option>Legal</option><option>Otros</option></select>
    </div>
    <div class="form-group"><label class="label">Concepto *</label><input class="input" id="ct-concepto" placeholder="Descripción del gasto"></div>
    <div class="form-group"><label class="label">Monto ($) *</label><input class="input" id="ct-monto" type="number" placeholder="0"></div>
    <div class="form-group"><label class="label">N° Factura / remito</label><input class="input" id="ct-ref" placeholder="FAC-2024-0089"></div>
    <button class="btn btn-primary btn-block mt8" onclick="confirmarCosto('${obraId}')">✓ Registrar</button>
    <button class="btn btn-outline btn-block mt8" onclick="closeModal()">Cancelar</button>
  `);
}

async function confirmarCosto(obraId) {
  const data = {
    obra_id: obraId,
    categoria: document.getElementById("ct-cat").value,
    concepto: document.getElementById("ct-concepto").value.trim(),
    monto: document.getElementById("ct-monto").value,
    referencia: document.getElementById("ct-ref").value.trim(),
  };
  if (!data.concepto || !data.monto) { toast("Concepto y monto son obligatorios"); return; }
  try {
    await api("addCosto", {}, data);
    closeModal();
    toast("✓ Costo registrado");
    cargarCostosObra(obraId);
  } catch(e) { toast("Error: "+e.message); }
}

// ═══════════════════════════════════════════════════════════
// MODAL / TOAST / SIDEBAR
// ═══════════════════════════════════════════════════════════

function openModal(html) {
  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("modal-backdrop").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal-backdrop").classList.add("hidden");
}

document.getElementById("modal-backdrop").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity = "0", 3000);
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebar-overlay").classList.toggle("open");
}

function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("open");
}

// Enter en login
document.getElementById("login-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

// ═══════════════════════════════════════════════════════════
// AUTO LOGIN si hay sesión guardada
// ═══════════════════════════════════════════════════════════
window.addEventListener("load", () => {
  const savedToken = localStorage.getItem("fibracor_token");
  const savedUser  = localStorage.getItem("fibracor_user");
  if (savedToken && savedUser) {
    TOKEN = savedToken;
    USER  = JSON.parse(savedUser);
    initApp();
  }
});
</script>
